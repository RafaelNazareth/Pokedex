<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <title>Pokédex</title>
</head>

<body>
    <header>
        <h1><i class="fas fa-pokeball"></i> Pokédex</h1>

        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="search-input" placeholder="Buscar Pokémon por nome ou número..." />
            </div>

            <div class="filter-container">
                <select id="type-filter">
                    <option value="all">Todos os tipos</option>
                </select>
                <button id="clear-filters" class="clear-btn">
                    <i class="fas fa-times"></i> Limpar
                </button>
            </div>
        </div>
    </header>

    <main>
        <!-- Loading State -->
        <div id="loading" class="loading">
            <div class="pokeball-loading">
                <i class="fas fa-pokeball fa-spin"></i>
            </div>
            <p>Carregando Pokémon...</p>
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
            <span id="progress-text">0/1025</span>
        </div>

        <!-- Error State -->
        <div id="error" class="error hidden">
            <i class="fas fa-exclamation-triangle"></i>
            <p>Erro ao carregar os Pokémon. Tente novamente.</p>
            <button id="retry-btn" class="retry-btn">Tentar novamente</button>
        </div>

        <!-- Pokémon Container -->
        <div class="poke-container" id="poke-container"></div>

        <!-- Modal de Detalhes -->
        <div id="pokemon-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <div id="modal-content"></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
